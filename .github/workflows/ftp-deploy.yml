name: Deploy to FTP - DreamHost

on:
  push:
    branches:
      - claude/fervent-dirac-6b6fxv

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install FTP tools
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Test FTP Connection
        run: |
          echo "Testing FTP connection to ${{ secrets.FTP_HOST }}..."
          lftp -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} \
            -e "open ${{ secrets.FTP_HOST }}; pwd; bye" \
            2>&1 | head -20

      - name: Deploy via FTP (Puerto 21)
        run: |
          echo "Starting FTP mirror sync..."
          lftp -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} \
            ${{ secrets.FTP_HOST }} <<'FTPCMD'
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          cd /home/${{ secrets.FTP_USER }}/limpiezaincendiosnanonex.es
          mirror -R --delete --verbose ./ ./
          quit
          FTPCMD

      - name: Deployment Summary
        run: |
          echo "✅ **Deployment FTP completado**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📤 Archivos sincronizados via FTP:" >> $GITHUB_STEP_SUMMARY
          echo "- Host: ${{ secrets.FTP_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Usuario: ${{ secrets.FTP_USER }}" >> $GITHUB_STEP_SUMMARY
          echo "- Carpeta: /home/${{ secrets.FTP_USER }}/limpiezaincendiosnanonex.es" >> $GITHUB_STEP_SUMMARY
