name: Desplegar web en GitHub Pages

on:
  push:
    branches: [main, claude/practical-dirac-7S40v]
    paths: ["web-html/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (web-html)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-html

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
