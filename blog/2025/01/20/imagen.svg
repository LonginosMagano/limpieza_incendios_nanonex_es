<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Content -->
  <text x="600" y="200" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">5 estrategias para los trabajadores de limpie</text><text x="600" y="270" font-size="48" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">de Diógenes que enfrentan el estrés continuo</text>
  
  <!-- Category -->
  <text x="600" y="580" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif">Limpieza de Sindrome de Diógen</text>
  
  <!-- Logo/Branding -->
  <text x="50" y="600" font-size="16" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif">Nano Nex</text>
